services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: delivro-task
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivro-task"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: